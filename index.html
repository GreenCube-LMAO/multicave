<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MultiCave · real multiplayer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
body{background:#0b0d10;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Inter,sans-serif;padding:12px;}
.game-wrapper{background:#13171c;border-radius:2.5rem;padding:1.2rem;max-width:960px;width:100%;}
canvas{display:block;width:100%;aspect-ratio:960/540;background:#0f1219;border-radius:1.8rem;touch-action:none;}
.controls{display:flex;justify-content:center;gap:18px;padding:10px;}
.ctrl-btn{width:72px;height:72px;border-radius:60px;border:1px solid #2f3e53;background:#1b232d;color:#d6e6ff;font-size:28px;cursor:pointer;}
.ctrl-btn:active{transform:translateY(4px);}
.rope-btn{background:#1e2a38;}
.info-bar{display:flex;justify-content:space-between;color:#7d96b3;font-size:12px;padding:0 6px;flex-wrap:wrap;gap:4px;}
.info-bar .status{display:flex;align-items:center;gap:6px;}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.status-dot.online{background:#44ff44;box-shadow:0 0 8px #44ff44;}
.status-dot.offline{background:#ff4444;box-shadow:0 0 8px #ff4444;}
.status-dot.connecting{background:#ffdd44;box-shadow:0 0 8px #ffdd44;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.chat-container{margin-top:8px;background:#0a0d12;border-radius:1rem;border:1px solid #1f2833;overflow:hidden;}
.chat-messages{height:100px;overflow-y:auto;padding:8px 12px;font-family:'Courier New',monospace;font-size:12px;color:#b0c4de;scroll-behavior:smooth;}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-track{background:#0a0d12;}
.chat-messages::-webkit-scrollbar-thumb{background:#2a3a4a;border-radius:2px;}
.chat-message{padding:2px 0;line-height:1.4;opacity:0.9;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px);}to{opacity:0.9;transform:translateY(0);}}
.chat-message .name{font-weight:600;}
.chat-message .time{color:#4a5a6a;font-size:10px;margin-right:6px;}
.chat-input-row{display:flex;padding:4px 8px 8px 8px;gap:6px;background:#0d1117;border-top:1px solid #1a222c;}
.chat-input{flex:1;background:#141a22;border:1px solid #25303d;border-radius:20px;padding:6px 14px;color:#d0e0f0;font-size:13px;font-family:'Courier New',monospace;outline:none;transition:border-color .2s;}
.chat-input:focus{border-color:#4a7aaa;}
.chat-input::placeholder{color:#4a5a6a;}
.chat-send{background:#1a2a3a;border:1px solid #2a4a6a;border-radius:20px;padding:6px 16px;color:#8ab4f8;font-size:13px;cursor:pointer;transition:background .2s;}
.chat-send:hover{background:#2a3a4a;}
.chat-send:active{transform:scale(.95);}
.name-input-container{display:flex;gap:8px;padding:6px 12px;background:#0d1117;border-bottom:1px solid #1a222c;align-items:center;}
.name-input{flex:1;background:#141a22;border:1px solid #25303d;border-radius:16px;padding:4px 12px;color:#d0e0f0;font-size:12px;font-family:'Courier New',monospace;outline:none;}
.name-input:focus{border-color:#4a7aaa;}
.name-label{color:#6a8aaa;font-size:11px;}
</style>
</head>
<body>
<div class="game-wrapper">
<canvas id="game" width="960" height="540"></canvas>
<div class="controls">
<button class="ctrl-btn" id="left">◀</button>
<button class="ctrl-btn rope-btn" id="rope">🪢</button>
<button class="ctrl-btn" id="right">▶</button>
</div>
<div class="info-bar">
<span>⬤ multi-cave · real multiplayer</span>
<span class="status"><span class="status-dot connecting" id="statusDot"></span><span id="statusText">Connecting...</span></span>
<span>🏁 finish: 5000</span>
</div>
<div class="chat-container">
<div class="name-input-container">
<span class="name-label">👤 Name:</span>
<input class="name-input" id="nameInput" placeholder="Enter your name..." maxlength="20">
</div>
<div class="chat-messages" id="chatMessages">
<div class="chat-message"><span class="time">[system]</span> 🌐 Connecting to multiplayer server...</div>
</div>
<div class="chat-input-row">
<input class="chat-input" id="chatInput" placeholder="Type a message..." maxlength="60">
<button class="chat-send" id="chatSend">Send</button>
</div>
</div>
</div>
<script>
(function(){

// ============================================================
// MULTIPLAYER - REAL WebSocket Server
// ============================================================

const WS_URL = "wss://ws.postman-echo.com/raw";

let ws = null;
let wsConnected = false;
let playerId = null;
let playerName = "Player_" + Math.floor(Math.random() * 1000);
let remotePlayers = {};
let reconnectAttempts = 0;
let maxReconnectAttempts = 10;
let reconnectTimeout = null;
let playerColor = "#44ff44";
const playerColors = ["#44ff44", "#ff6b6b", "#ffd93d", "#6bcb77", "#4d96ff", "#9b59b6", "#ff6b35", "#74b9ff", "#a29bfe", "#fd79a8"];

const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");
const nameInput = document.getElementById("nameInput");

playerColor = playerColors[Math.floor(Math.random() * playerColors.length)];

nameInput.value = playerName;
nameInput.addEventListener("change", function() {
  playerName = this.value.trim() || "Player_" + Math.floor(Math.random() * 1000);
  if (wsConnected && ws) {
    ws.send(JSON.stringify({
      type: "namechange",
      id: playerId,
      name: playerName
    }));
  }
});

function updateStatus(state, text) {
  statusDot.className = "status-dot " + state;
  statusText.textContent = text;
}

function connectWebSocket() {
  updateStatus("connecting", "Connecting...");
  
  try {
    ws = new WebSocket(WS_URL);
    
    ws.onopen = function() {
      wsConnected = true;
      reconnectAttempts = 0;
      updateStatus("online", "Online");
      addChatMessage("system", "✅ Connected to server! Share the link to play with others.", true);
      
      const joinMsg = {
        type: "join",
        id: playerId || "player_" + Math.random().toString(36).substr(2, 6),
        name: playerName || "Player",
        x: player.x,
        y: player.y,
        color: playerColor,
        rope: false
      };
      ws.send(JSON.stringify(joinMsg));
      if (!playerId) playerId = joinMsg.id;
      
      setTimeout(() => {
        sendPlayerUpdate();
      }, 100);
    };
    
    ws.onmessage = function(event) {
      try {
        const data = JSON.parse(event.data);
        handleMessage(data);
      } catch (e) {
        if (event.data && event.data.trim()) {
          addChatMessage("server", event.data);
        }
      }
    };
    
    ws.onclose = function() {
      wsConnected = false;
      updateStatus("offline", "Disconnected");
      addChatMessage("system", "❌ Disconnected from server. Reconnecting...", true);
      attemptReconnect();
    };
    
    ws.onerror = function(err) {
      wsConnected = false;
      updateStatus("offline", "Error");
      addChatMessage("system", "⚠️ Connection error. Retrying...", true);
      attemptReconnect();
    };
  } catch (e) {
    addChatMessage("system", "⚠️ WebSocket error. Running in local mode.", true);
    updateStatus("offline", "Local mode");
  }
}

function attemptReconnect() {
  if (reconnectAttempts >= maxReconnectAttempts) {
    addChatMessage("system", "❌ Max reconnect attempts reached. Refresh to try again.", true);
    updateStatus("offline", "Failed");
    return;
  }
  
  reconnectAttempts++;
  const delay = Math.min(1000 * reconnectAttempts, 10000);
  
  if (reconnectTimeout) clearTimeout(reconnectTimeout);
  reconnectTimeout = setTimeout(() => {
    addChatMessage("system", `🔄 Reconnecting (attempt ${reconnectAttempts})...`, true);
    connectWebSocket();
  }, delay);
}

function handleMessage(data) {
  switch(data.type) {
    case "join":
      if (data.id !== playerId) {
        if (!remotePlayers[data.id]) {
          remotePlayers[data.id] = {
            id: data.id,
            name: data.name || "Player",
            x: data.x || 270,
            y: data.y || 270,
            vx: 0,
            vy: 0,
            color: data.color || "#8888ff",
            rope: false,
            ropeX: 0,
            ropeY: 0,
            lastUpdate: Date.now(),
            finished: false,
            joined: Date.now()
          };
          addChatMessage("system", `👋 ${remotePlayers[data.id].name} joined the game!`, true);
          updatePlayerCount();
        }
      }
      break;
      
    case "update":
      if (data.id && data.id !== playerId && remotePlayers[data.id]) {
        remotePlayers[data.id].x = data.x || remotePlayers[data.id].x;
        remotePlayers[data.id].y = data.y || remotePlayers[data.id].y;
        remotePlayers[data.id].vx = data.vx || 0;
        remotePlayers[data.id].vy = data.vy || 0;
        remotePlayers[data.id].rope = data.rope || false;
        remotePlayers[data.id].ropeX = data.ropeX || 0;
        remotePlayers[data.id].ropeY = data.ropeY || 0;
        remotePlayers[data.id].lastUpdate = Date.now();
        remotePlayers[data.id].finished = data.finished || false;
      }
      break;
      
    case "chat":
      if (data.id !== playerId) {
        const name = remotePlayers[data.id]?.name || data.name || "Player";
        const color = remotePlayers[data.id]?.color || "#ffffff";
        addChatMessage(name, data.message, false, color);
      }
      break;
      
    case "namechange":
      if (data.id !== playerId && remotePlayers[data.id]) {
        const oldName = remotePlayers[data.id].name;
        remotePlayers[data.id].name = data.name || "Player";
        addChatMessage("system", `📝 ${oldName} is now known as ${data.name}`, true);
      }
      break;
      
    case "leave":
      if (data.id && remotePlayers[data.id]) {
        const name = remotePlayers[data.id].name || "Player";
        delete remotePlayers[data.id];
        addChatMessage("system", `👋 ${name} left the game.`, true);
        updatePlayerCount();
      }
      break;
      
    case "finish":
      if (data.id !== playerId && remotePlayers[data.id]) {
        const name = remotePlayers[data.id].name || "Player";
        remotePlayers[data.id].finished = true;
        addChatMessage("system", `🏁 ${name} finished the race!`, true);
      }
      break;
      
    default:
      break;
  }
}

function updatePlayerCount() {
  const count = Object.keys(remotePlayers).length + 1;
  updateStatus("online", `Online (${count} players)`);
}

let lastSendTime = 0;

function sendPlayerUpdate() {
  if (!wsConnected || !ws || !playerId) return;
  
  const now = Date.now();
  if (now - lastSendTime < 50) return;
  lastSendTime = now;
  
  try {
    ws.send(JSON.stringify({
      type: "update",
      id: playerId,
      x: player.x,
      y: player.y,
      vx: player.vx,
      vy: player.vy,
      rope: player.rope.active,
      ropeX: player.rope.x,
      ropeY: player.rope.y,
      finished: player.finished || false
    }));
  } catch (e) {}
}

function sendChatMessage(text) {
  if (!wsConnected || !ws) {
    addChatMessage("system", "⚠️ Not connected to server. Message sent locally.", true);
    return false;
  }
  
  try {
    ws.send(JSON.stringify({
      type: "chat",
      id: playerId,
      name: playerName,
      message: text
    }));
    return true;
  } catch (e) {
    addChatMessage("system", "⚠️ Failed to send message.", true);
    return false;
  }
}

function sendFinish() {
  if (!wsConnected || !ws) return;
  
  try {
    ws.send(JSON.stringify({
      type: "finish",
      id: playerId
    }));
  } catch (e) {}
}

function cleanupRemotePlayers() {
  const now = Date.now();
  for (let id in remotePlayers) {
    if (now - remotePlayers[id].lastUpdate > 15000) {
      delete remotePlayers[id];
      updatePlayerCount();
    }
  }
}

// ============================================================
// CHAT SYSTEM
// ============================================================

const chatMessages = document.getElementById("chatMessages");
const chatInput = document.getElementById("chatInput");
const chatSend = document.getElementById("chatSend");

function addChatMessage(sender, message, isSystem = false, color = null) {
  const div = document.createElement("div");
  div.className = "chat-message";
  const time = new Date().toLocaleTimeString();
  
  if (isSystem) {
    div.innerHTML = `<span class="time">[${time}]</span> <span style="color:#6a8aaa;">${message}</span>`;
  } else {
    const nameColor = color || "#ffffff";
    let emoji = "";
    for (let id in remotePlayers) {
      if (remotePlayers[id].name === sender) {
        emoji = "🟪";
        break;
      }
    }
    if (sender === playerName) emoji = "🟩";
    div.innerHTML = `<span class="time">[${time}]</span> <span class="name" style="color:${nameColor}">${emoji} ${sender}:</span> ${message}`;
  }
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  while (chatMessages.children.length > 100) {
    chatMessages.removeChild(chatMessages.firstChild);
  }
}

function sendPlayerMessage() {
  const text = chatInput.value.trim();
  if (!text) return;
  
  addChatMessage(playerName, text, false, playerColor);
  sendChatMessage(text);
  chatInput.value = "";
}

chatSend.addEventListener("click", sendPlayerMessage);
chatInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    sendPlayerMessage();
  }
});

// ============================================================
// GAME
// ============================================================

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const CW=960,CH=540;
const FINISH=5000;
const BONUS_AREA_START=FINISH+40;
const BONUS_AREA_END=FINISH+800;
const input={left:false,right:false,rope:false};

function setupButton(btn,key){const start=e=>{e.preventDefault();input[key]=true;};const end=e=>{e.preventDefault();input[key]=false;};btn.addEventListener("mousedown",start);btn.addEventListener("mouseup",end);btn.addEventListener("mouseleave",end);btn.addEventListener("touchstart",start,{passive:false});btn.addEventListener("touchend",end,{passive:false});}
setupButton(document.getElementById("left"),"left");setupButton(document.getElementById("right"),"right");setupButton(document.getElementById("rope"),"rope");

// ============================================================
// TERRAIN
// ============================================================

const cave=[];
function generateTerrain() {
  const segments = [];
  const totalSegments = Math.ceil(FINISH / 80);
  const sectionData = [
    { start: 0, len: 12, gen: (i,p) => 270 + Math.sin(i*0.06)*35 + Math.cos(i*0.09+1.2)*25 },
    { start: 12, len: 10, gen: (i,p) => { const s=Math.abs(Math.sin(i*0.3+0.7)); return 80 + s*340; } },
    { start: 22, len: 14, gen: (i,p) => 270 + Math.sin(p*Math.PI)*150 + Math.sin(i*0.05)*15 },
    { start: 36, len: 12, gen: (i,p) => { const f=Math.sin(i*0.12+0.5); return f>0.2 ? 270+Math.sin(p*Math.PI*2)*80 : 490; } },
    { start: 48, len: 10, gen: (i,p) => 270 + Math.sin(i*0.25)*20 },
    { start: 58, len: 16, gen: (i,p) => 270 + Math.sin(i*0.08)*75 + Math.sin(i*0.18+1.2)*45 },
    { start: 74, len: 14, gen: (i,p) => { let h=270+Math.sin(i*0.05+2.1)*80; if(Math.sin(i*0.2+4.5)>0.65) h-=70; if(Math.cos(i*0.15+3.3)>0.65) h+=70; return h; } },
    { start: 88, len: 8, gen: (i,p) => { if(p<0.5) return 180+p*2*140; return 320+(p-0.5)*2*90; } },
    { start: 96, len: 14, gen: (i,p) => 270 + Math.sin(i*0.03+1.2)*45 + Math.sin(i*0.07+0.7)*25 },
    { start: 110, len: 10, gen: (i,p) => { const s=Math.abs(Math.sin(i*0.35+0.9)); return 60 + s*380 + Math.sin(i*0.12)*25; } },
    { start: 120, len: 16, gen: (i,p) => 270 + Math.sin(i*0.04)*50 + Math.cos(i*0.08+0.8)*35 },
    { start: 136, len: 12, gen: (i,p) => { const g=Math.sin(i*0.1+0.3); return g>0.15 ? 270+Math.sin(p*Math.PI*3)*35 : 470; } },
    { start: 148, len: 10, gen: (i,p) => 270 + Math.sin(i*0.15)*25 + Math.cos(i*0.2+1.5)*15 },
    { start: 158, len: 14, gen: (i,p) => 270 - p*90 + Math.sin(i*0.06)*30 },
    { start: 172, len: 999, gen: (i,p) => 220 + Math.sin(i*0.04)*30 + Math.sin(i*0.12+1.5)*20 },
  ];
  for (let i = 0; i < totalSegments; i++) {
    let height = 270;
    for (let s of sectionData) {
      if (i >= s.start && i < s.start + s.len) {
        const p = s.len === 0 ? 0 : (i - s.start) / s.len;
        height = s.gen(i, p);
        break;
      }
    }
    height = Math.max(50, Math.min(490, height));
    segments.push({ top: height - 150, bottom: height + 150 });
  }
  return segments;
}

const mainCave = generateTerrain();
for (let i = FINISH / 80; i < (FINISH + 800) / 80; i++) {
  const x = i * 80;
  const p = (x - FINISH) / 800;
  let centerY = 270;
  centerY += Math.sin(p * 0.4 + 0.7) * 90;
  centerY += Math.sin(p * 0.8 + 2.1) * 55;
  centerY += Math.cos(p * 1.2 + 4.5) * 40;
  const roomHeight = 180 + Math.sin(p * 0.6 + 1.3) * 80 + Math.cos(p * 0.9 + 3.7) * 50;
  mainCave.push({ top: centerY - roomHeight/2, bottom: centerY + roomHeight/2, isBonus: true });
}
cave.push(...mainCave);
const WALL_X = BONUS_AREA_END + 40;

let bonusRings=[];
let score=0;
let gameFinished=false;
let finishLineCrossed=false;
let playerFinished = false;

function makeCube(x,color){
  return {
    x, y:270, lastX:x, vx:0, vy:0, w:26, h:26,
    color,
    ground:false,
    rope: { active:false, x:0, y:0, length:150, restLength:150, spring:0.025, damping:0.65 },
    finished:false,
    checkX: x, moveTimer: 0
  };
}

const player=makeCube(200,playerColor);

// ============================================================
// NO BOTS - Only real players!
// ============================================================

function getCaveBoundsAt(x) {
  const idx = Math.floor(x / 80);
  if (idx < 0 || idx >= cave.length) return null;
  const section = cave[idx];
  return { top: section.top + 30, bottom: section.bottom - 30, isValid: section.top + 30 < section.bottom - 30 };
}

function spawnBonusRings(){
  bonusRings=[];
  const count=8+Math.floor(Math.random()*5);
  for(let i=0;i<count;i++){
    let attempts=0, x, y, bounds;
    do {
      x = BONUS_AREA_START + 60 + Math.random() * (WALL_X - BONUS_AREA_START - 120);
      bounds = getCaveBoundsAt(x);
      attempts++;
    } while ((!bounds || !bounds.isValid || bounds.top >= bounds.bottom) && attempts < 50);
    if (bounds && bounds.isValid) {
      const padding = 20;
      const minY = Math.max(20, bounds.top + padding);
      const maxY = Math.min(CH - 20, bounds.bottom - padding);
      y = minY + Math.random() * (maxY - minY);
    } else {
      x = BONUS_AREA_START + 100 + i * 60;
      y = 150 + Math.random() * 200;
    }
    bonusRings.push({ x, y, radius:22, collected:false, points:10, bobOffset:Math.random()*Math.PI*2, respawnTimer:0 });
  }
}

function respawnRing(ring){
  let attempts=0, x, y, bounds;
  do {
    x = BONUS_AREA_START + 60 + Math.random() * (WALL_X - BONUS_AREA_START - 120);
    bounds = getCaveBoundsAt(x);
    attempts++;
  } while ((!bounds || !bounds.isValid || bounds.top >= bounds.bottom) && attempts < 50);
  if (bounds && bounds.isValid) {
    const padding = 20;
    const minY = Math.max(20, bounds.top + padding);
    const maxY = Math.min(CH - 20, bounds.bottom - padding);
    y = minY + Math.random() * (maxY - minY);
  } else {
    x = BONUS_AREA_START + 100 + Math.random() * 300;
    y = 150 + Math.random() * 200;
  }
  ring.x=x; ring.y=y; ring.collected=false; ring.radius=20+Math.random()*6; ring.respawnTimer=0;
}

function physics(c,control){
  if(c.finished)return;

  if(control.left)c.vx-=0.20;
  if(control.right)c.vx+=0.20;
  c.vx*=c.ground?0.78:0.98;

  if(control.rope && !c.rope.active){
    let id=Math.floor(c.x/80);
    let section=cave[id];
    if(section){
      c.rope.active=true;
      c.rope.x=id*80+40;
      c.rope.y=section.top+8;
      c.rope.length=150;
      c.rope.restLength=150;
    }
  }
  if(!control.rope)c.rope.active=false;

  if(c.rope.active){
    let dx=c.x-c.rope.x, dy=c.y-c.rope.y;
    let dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>0.1){
      let nx=dx/dist, ny=dy/dist;
      let stretch=dist-c.rope.length;
      let force=stretch*c.rope.spring;
      c.vx-=nx*force;
      c.vy-=ny*force;
      const velAlong=c.vx*nx+c.vy*ny;
      if(velAlong>0){
        c.vx-=nx*velAlong*c.rope.damping;
        c.vy-=ny*velAlong*c.rope.damping;
      }
      c.vy+=0.08;
    }
    if(control.rope){
      c.rope.length-=0.6;
      if(c.rope.length<45)c.rope.length=45;
    } else {
      c.rope.length += (c.rope.restLength - c.rope.length) * 0.015;
    }
  } else {
    c.vy+=0.45;
  }

  c.x+=c.vx;
  c.y+=c.vy;

  const crossedRight = c.lastX + c.w <= FINISH && c.x + c.w > FINISH && c.vx > 0;
  const crossedLeft = c.lastX >= FINISH && c.x < FINISH;

  if(crossedRight){
    if(c === player && !finishLineCrossed){
      finishLineCrossed = true;
      spawnBonusRings();
      gameFinished = true;
      playerFinished = true;
      sendFinish();
      addChatMessage("system", "🏆 You crossed the finish line! Bonus round activated!", true);
    }
  }
  if(crossedLeft && c.vx < 0){
    c.x = FINISH;
    c.vx = 0;
  }
  c.lastX = c.x;

  let section=cave[Math.floor(c.x/80)];
  if(section){
    let floor=section.bottom-c.h;
    if(c.y>floor){ c.y=floor; c.vy=0; c.ground=true; }
    else { c.ground=false; }
    let ceiling=section.top+2;
    if(c.y<ceiling){ c.y=ceiling; c.vy=0; if(c.rope.active)c.rope.active=false; }
  }

  if(c.x+c.w>WALL_X){ c.x=WALL_X-c.w; c.vx=-Math.abs(c.vx)*0.5; }

  if(c===player && gameFinished){
    for(let r of bonusRings){
      if(!r.collected){
        let dx=r.x-(c.x+c.w/2), dy=r.y-(c.y+c.h/2);
        let d=Math.sqrt(dx*dx+dy*dy);
        if(d<r.radius+15){
          r.collected=true;
          score+=r.points;
          addChatMessage("system", `💛 +10 points! (${score} total)`, true);
          setTimeout(() => respawnRing(r), 500);
        }
      }
    }
  }

  if(c.y < 0){ c.y=0; c.vy=0; }
  if(c.y+c.h > CH){ c.y=CH-c.h; c.vy=0; }
  if(c.x < -200){ c.x=-200; c.vx=0; }
  if(c.x > FINISH+900){ c.x=FINISH+800; c.vx=0; }
}

// ============================================================
// UPDATE & DRAW
// ============================================================

function update(){
  physics(player,input);

  const allFinished = Object.values(remotePlayers).every(p => p.finished);
  if(allFinished && finishLineCrossed && !gameFinished){
    gameFinished = true;
    spawnBonusRings();
  }

  let t=Date.now()/1000;
  for(let r of bonusRings){
    if(!r.collected){
      r.y += Math.sin(t*2 + r.bobOffset) * 0.08;
    }
  }
  
  sendPlayerUpdate();
  if (Math.random() < 0.01) cleanupRemotePlayers();
}

function draw(){
  let cam=player.x-400;
  ctx.clearRect(0,0,CW,CH);
  ctx.fillStyle="#101020";
  ctx.fillRect(0,0,CW,CH);

  ctx.fillStyle="#555";
  cave.forEach((s,i)=>{
    let x=i*80-cam;
    if(x>-120 && x<1080){
      ctx.fillRect(x,0,80,s.top);
      ctx.fillRect(x,s.bottom,80,CH-s.bottom);
    }
  });

  ctx.fillStyle="rgba(255,200,50,.25)";
  ctx.fillRect(FINISH-cam,0,8,CH);
  ctx.fillStyle="#ffdd44";
  ctx.font="28px Inter";
  ctx.fillText("▶",FINISH-cam+10,45);
  ctx.fillText("▶",FINISH-cam+10,CH-15);
  ctx.font="bold 14px Inter";
  ctx.fillText("🏁 FINISH",FINISH-cam-40,25);

  if(gameFinished || finishLineCrossed){
    for(let r of bonusRings){
      let rx=r.x-cam;
      if(!r.collected){
        ctx.shadowColor="rgba(255,215,0,0.3)";
        ctx.shadowBlur=15;
        ctx.strokeStyle="#ffd700";
        ctx.lineWidth=3;
        ctx.beginPath();
        ctx.arc(rx,r.y,r.radius,0,Math.PI*2);
        ctx.stroke();
        ctx.shadowBlur=0;
        ctx.strokeStyle="rgba(255,215,0,0.2)";
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.arc(rx,r.y,r.radius*0.6,0,Math.PI*2);
        ctx.stroke();
        ctx.fillStyle="#ffd700";
        ctx.font="11px Inter";
        ctx.textAlign="center";
        ctx.fillText("+10",rx,r.y+4);
      } else {
        ctx.fillStyle="rgba(100,255,100,0.1)";
        ctx.beginPath();
        ctx.arc(rx,r.y,r.radius,0,Math.PI*2);
        ctx.fill();
      }
    }
  }

  ctx.fillStyle="#8a2a2a";
  ctx.fillRect(WALL_X-cam,0,12,CH);

  // Draw remote players (real players only - NO BOTS!)
  const sortedPlayers = Object.values(remotePlayers).sort((a,b) => a.x - b.x);
  for (let rp of sortedPlayers) {
    const x = rp.x - cam;
    const y = rp.y;
    
    if (x > -50 && x < CW + 50) {
      if (rp.rope) {
        ctx.strokeStyle="rgba(255,255,255,0.25)";
        ctx.lineWidth=2;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(x, y + 13);
        ctx.lineTo(rp.ropeX - cam, rp.ropeY);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      
      ctx.fillStyle = rp.color || "#8888ff";
      ctx.shadowColor = "rgba(100,100,255,0.3)";
      ctx.shadowBlur = 10;
      ctx.fillRect(x, y, 26, 26);
      ctx.shadowBlur = 0;
      
      ctx.fillStyle = rp.color || "#8888ff";
      ctx.font = "9px Inter";
      ctx.textAlign = "center";
      const displayName = rp.name || "Player";
      ctx.fillText("🟪 " + displayName, x + 13, y - 6);
      
      if (rp.finished) {
        ctx.fillStyle = "#ffd700";
        ctx.font = "14px Inter";
        ctx.fillText("🏆", x + 13, y + 38);
      }
    }
  }

  // Draw local player
  const c = player;
  
  if(c.rope.active){
    ctx.strokeStyle="#44ff44";
    ctx.lineWidth=3;
    ctx.shadowColor="rgba(68,255,68,0.3)";
    ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.moveTo(c.x-cam,c.y+c.h/2);
    ctx.lineTo(c.rope.x-cam,c.rope.y);
    ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle="rgba(68,255,68,0.3)";
    ctx.beginPath();
    ctx.arc(c.rope.x-cam,c.rope.y,8,0,Math.PI*2);
    ctx.fill();
  }

  ctx.fillStyle=c.color;
  ctx.shadowColor = "rgba(68,255,68,0.3)";
  ctx.shadowBlur = 15;
  ctx.fillRect(c.x-cam,c.y,c.w,c.h);
  ctx.shadowBlur=0;

  ctx.fillStyle = "#44ff44";
  ctx.font = "bold 10px Inter";
  ctx.textAlign = "center";
  ctx.fillText("🟩 You", c.x-cam+c.w/2, c.y-8);

  // HUD
  ctx.fillStyle="#6f8bb0";
  ctx.font="12px Inter";
  const playerCount = Object.keys(remotePlayers).length;
  ctx.fillText(`👥 ${playerCount + 1} players online`,20,30);

  ctx.fillStyle="#ffd700";
  ctx.font="bold 14px Inter";
  ctx.fillText(`⭐ ${score}`,CW-80,30);

  if(gameFinished || finishLineCrossed){
    ctx.fillStyle="#88ddff";
    ctx.font="12px Inter";
    ctx.fillText("✨ BONUS AREA",FINISH-cam+60,25);
    const total = bonusRings.length;
    const collected = bonusRings.filter(r=>r.collected).length;
    ctx.fillStyle="#88ddff";
    ctx.font="11px Inter";
    ctx.fillText(`⭕ ${collected}/${total} rings`,CW-80,50);
  }
}

// ============================================================
// LOOP
// ============================================================

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

connectWebSocket();
loop();

canvas.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft" || e.key==="ArrowRight" || e.key===" "){
    e.preventDefault();
  }
});

setTimeout(() => {
  playerId = "player_" + Math.random().toString(36).substr(2, 6);
  if (!wsConnected) {
    setTimeout(connectWebSocket, 1000);
  }
}, 500);

setTimeout(() => {
  addChatMessage("system", "💬 Share this link with friends to play together!", true);
  addChatMessage("system", "🟪 Purple players are real people like you!", true);
  addChatMessage("system", "🤖 No bots - all players are real!", true);
}, 2000);

})();
</script>
